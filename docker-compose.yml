version: "3.9"

services:

  web:
    build: .
    container_name: python_app
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: mydb
    networks:
      - app-net
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-net
    # ❌ removed port exposure for security (best practice)
    # ports:
    #   - "3306:3306"

volumes:
  db_data:

networks:
  app-net:
